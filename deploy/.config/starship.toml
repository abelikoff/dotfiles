[custom.user_prefix]
# This checks if the user is NOT abel. If so, it prints the username + @
command = 'if [ "$USER" != "abel" ]; then echo -n "$USER"; fi'
when = "true" # Always run the check
shell = ["sh"]
style = "fg:#7DF9AA bg:#333399"
format = "[$output]($style)"

[hostname]
ssh_only = true
trim_at = "."
style = "fg:#7DF9AA bg:#1C3A5E"
format = "[@$hostname]($style)"
disabled = false

[directory]
style = "fg:#7DF9AA bg:#1C3A5E"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "â€¦/"

[git_branch]
format = '[ $symbol$branch(:$remote_branch) ]($style)'
symbol = "âژ‡  "
style = "fg:#E4E4E4 bg:#3B76F0"

[custom.not_git]
when = "! git rev-parse --is-inside-work-tree 2> /dev/null"
shell = ["sh"]
style = "fg:#3B76F0"
format = "[î‚°]($style) "

[git_status]
#format = '($all_status x $ahead_behind y)'
format = '$ahead_behind '
